version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rithits-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-rithits}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rithits_pass}
      POSTGRES_DB: ${DB_NAME:-rithits_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rithits-redis
    restart: always
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: rithits-search
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio:latest
    container_name: rithits-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-password123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rithits-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-rithits}:${DB_PASSWORD:-rithits_pass}@postgres:5432/${DB_NAME:-rithits_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-password123}
      JWT_SECRET: ${JWT_SECRET:-rit-hits-super-secret-key-2026}
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - minio
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  postgres_data:
  es_data:
  minio_data:
